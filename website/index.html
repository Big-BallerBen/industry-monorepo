<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDUSTRY | The Bar Hiring App</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#050505',
                        'panel-black': '#0A0A0A',
                        'electric-blue': '#00e0ff',
                        'uv-teal': '#00f7d1',
                        'neon-rose': '#FF7EB3',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                    },
                    fontFamily: {
                        'display': ['Montserrat', 'sans-serif'],
                        'body': ['Space Grotesk', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 10px rgba(0, 224, 255, 0.3)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 1.5s ease-out forwards',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 10px rgba(255, 255, 255, 0.1)' },
                            '100%': { boxShadow: '0 0 30px rgba(255, 255, 255, 0.4), 0 0 10px rgba(0, 224, 255, 0.2)' }
                        }
                    },
                    backgroundImage: {
                        'chrome-gradient': 'linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 40%, #FFFFFF 100%)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            overflow-x: hidden;
            margin: 0;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 10; 
            pointer-events: none; /* Pass interactions */
        }

        .content-layer {
            position: relative;
            z-index: 20;
        }

        /* Loader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Loading Screen -->
    <div id="loader" class="loader">
        <div class="text-white font-display text-2xl tracking-[0.5em] animate-pulse">INDUSTRY<span class="text-electric-blue">.IO</span></div>
    </div>
    
    <!-- 3D Canvas Container (Background + Droplets) -->
    <div id="canvas-container"></div>

    <!-- Main Content -->
    <main class="content-layer w-full min-h-screen flex flex-col justify-center items-center px-4 overflow-hidden relative">
        
        <!-- Typography Container -->
        <div class="text-center z-30 flex flex-col items-center gap-8">
            
            <!-- HERO TEXT -->
            <div>
                <h1 class="font-display font-black text-6xl md:text-8xl lg:text-[11rem] leading-none tracking-tighter text-white mb-2 drop-shadow-[0_0_30px_rgba(255,255,255,0.6)] transition-transform duration-100 ease-out" id="hero-title">
                    INDUSTRY
                </h1>

                <!-- SUBHEADLINES -->
                <div class="animate-fade-up" style="animation-delay: 0.2s;">
                    <h2 class="font-display text-cyan-400 tracking-[0.3em] text-xs md:text-base lg:text-lg uppercase font-bold mb-8 drop-shadow-md">
                        Book the Future.  Shift the Culture.
                    </h2>
                </div>
            </div>
            
            <!-- BUTTONS (Stacked) -->
            <div class="flex flex-col gap-4 items-center animate-fade-up" style="animation-delay: 0.4s;">
                <!-- Button 1: Links to the main Homepage (Carousel) -->
                <a href="home.html" class="w-64 px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-xl transition-all duration-300 shadow-[0_0_12px_rgba(34,211,238,0.5)] hover:scale-[1.05] active:scale-[0.98] font-display text-xs tracking-[0.2em] uppercase text-center">
                    Enter Platform
                </a>

                <!-- Button 2: Log In (Glass Style) -->
                <button class="w-64 px-8 py-3 bg-white/5 hover:bg-white/10 border border-white/30 hover:border-white text-white font-bold rounded-xl transition-all duration-300 backdrop-blur-md hover:scale-[1.05] active:scale-[0.98] font-display text-xs tracking-[0.2em] uppercase text-center flex items-center justify-center gap-2 group">
                    <i data-lucide="user" class="w-4 h-4 group-hover:rotate-12 transition-transform"></i>
                    Log In
                </button>
            </div>
        </div>

    </main>
    
    <script>
        // --- VISUALS: THREE.JS SETUP ---
        window.onload = () => {
            const loader = document.getElementById('loader');
            setTimeout(() => loader.style.opacity = '0', 500);
            setTimeout(() => loader.remove(), 1500);
            initThreeJS();
            lucide.createIcons();
        };

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            
            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x050505, 5, 25);
            
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // --- 1. BACKGROUND IMAGE PLANE ---
            const bgTexture = new THREE.TextureLoader().load('https://images.unsplash.com/photo-1575023782549-62ca2d2f3b4e?q=80&w=2874&auto=format&fit=crop');
            const bgGeometry = new THREE.PlaneGeometry(24, 16); 
            const bgMaterial = new THREE.MeshBasicMaterial({ map: bgTexture });
            const bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
            bgMesh.position.z = -3; 
            bgMesh.scale.set(1.1, 1.1, 1.1); 
            scene.add(bgMesh);

            // --- 2. LIGHTING ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x00e0ff, 0.8, 20);
            backLight.position.set(-5, 5, -1);
            scene.add(backLight);
            const leftGlow = new THREE.PointLight(0x22d3ee, 1.5, 30);
            leftGlow.position.set(-10, 0, 5);
            scene.add(leftGlow);
            const rightGlow = new THREE.PointLight(0xFF00FF, 1.5, 30);
            rightGlow.position.set(10, 0, 5);
            scene.add(rightGlow);

            // --- 3. MARTINI GLASS ---
            const martiniGroup = new THREE.Group();
            const glassPoints = [];
            glassPoints.push(new THREE.Vector2(0, 0));
            glassPoints.push(new THREE.Vector2(1.0, 0)); 
            glassPoints.push(new THREE.Vector2(1.0, 0.1));
            glassPoints.push(new THREE.Vector2(0.12, 0.2)); 
            glassPoints.push(new THREE.Vector2(0.12, 1.8)); 
            glassPoints.push(new THREE.Vector2(1.5, 3.2));
            glassPoints.push(new THREE.Vector2(1.4, 3.2));
            glassPoints.push(new THREE.Vector2(0.1, 1.9)); 

            const glassGeo = new THREE.LatheGeometry(glassPoints, 64);
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x222222, emissive: 0x110011, emissiveIntensity: 0.1, metalness: 0.2, roughness: 0.02,
                transmission: 0.4, opacity: 0.7, thickness: 0.8, ior: 1.5, reflectivity: 1.0,
                clearcoat: 1.0, clearcoatRoughness: 0.0, transparent: true, side: THREE.DoubleSide, envMapIntensity: 2.0
            });
            const glassMesh = new THREE.Mesh(glassGeo, glassMat);
            martiniGroup.add(glassMesh);

            const edgesGeo = new THREE.EdgesGeometry(glassGeo, 15);
            const edgesMat = new THREE.LineBasicMaterial({ color: 0xFF00FF, linewidth: 2, opacity: 0.8, transparent: true });
            const glassOutline = new THREE.LineSegments(edgesGeo, edgesMat);
            martiniGroup.add(glassOutline);

            const rimGeo = new THREE.TorusGeometry(1.45, 0.02, 16, 100);
            const rimMat = new THREE.MeshBasicMaterial({ color: 0xFF00FF, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
            const rimMesh = new THREE.Mesh(rimGeo, rimMat);
            rimMesh.rotation.x = Math.PI / 2; rimMesh.position.y = 3.2; 
            martiniGroup.add(rimMesh);

            const baseGeo = new THREE.TorusGeometry(1.0, 0.02, 16, 100);
            const baseMesh = new THREE.Mesh(baseGeo, rimMat); 
            baseMesh.rotation.x = Math.PI / 2; baseMesh.position.y = 0.0;
            martiniGroup.add(baseMesh);
            
            const baseDiskGeo = new THREE.CircleGeometry(1.0, 32);
            const baseDiskMesh = new THREE.Mesh(baseDiskGeo, glassMat);
            baseDiskMesh.rotation.x = -Math.PI / 2; baseDiskMesh.position.y = 0.01;
            martiniGroup.add(baseDiskMesh);

            const liquidGeo = new THREE.ConeGeometry(1.25, 1.0, 32, 1, true); 
            const liquidMat = new THREE.MeshPhysicalMaterial({
                color: 0xFF00FF, emissive: 0xFF00FF, emissiveIntensity: 0.3, metalness: 0.1, roughness: 0.1,
                transmission: 0.6, ior: 1.1, transparent: true, opacity: 0.5, side: THREE.DoubleSide
            });
            const liquidMesh = new THREE.Mesh(liquidGeo, liquidMat);
            liquidMesh.position.y = 2.7; liquidMesh.rotation.x = Math.PI; 
            martiniGroup.add(liquidMesh);

            const liquidLight = new THREE.PointLight(0xFF00FF, 1.0, 4);
            liquidLight.position.set(0, 2.8, 0);
            martiniGroup.add(liquidLight);

            // Garnish/Straw
            const garnishGroup = new THREE.Group();
            const stickGeo = new THREE.CylinderGeometry(0.03, 0.03, 3.0, 16);
            const stickMat = new THREE.ShaderMaterial({
                uniforms: {
                    color1: { value: new THREE.Color(0x00e0ff) }, 
                    color2: { value: new THREE.Color(0xFF00FF) }, 
                },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `uniform vec3 color1; uniform vec3 color2; varying vec2 vUv; void main() { gl_FragColor = vec4(mix(color1, color2, pow(vUv.y, 3.0)), 1.0); }`,
                transparent: true
            });
            const stickMesh = new THREE.Mesh(stickGeo, stickMat);
            garnishGroup.add(stickMesh);
            garnishGroup.rotation.z = Math.PI / 4; 
            garnishGroup.rotation.y = Math.PI / 6; 
            garnishGroup.position.set(-1.15, 3.5, 0);
            garnishGroup.scale.set(0.85, 0.85, 0.85);
            martiniGroup.add(garnishGroup);

            // Bubbles
            const bubbleCount = 30;
            const bubbleGeo = new THREE.BufferGeometry();
            const bubblePos = new Float32Array(bubbleCount * 3);
            const bubbleSpeeds = [];
            for(let i=0; i<bubbleCount; i++) {
                const r = Math.random() * 0.8;
                const theta = Math.random() * Math.PI * 2;
                bubblePos[i*3] = r * Math.cos(theta);     
                bubblePos[i*3+1] = 2.8 + Math.random() * 0.6;   
                bubblePos[i*3+2] = r * Math.sin(theta);   
                bubbleSpeeds.push(0.005 + Math.random() * 0.01);
            }
            bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
            const bubbleMat = new THREE.PointsMaterial({ color: 0xFF00FF, size: 0.05, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
            const bubbleSystem = new THREE.Points(bubbleGeo, bubbleMat);
            martiniGroup.add(bubbleSystem);

            martiniGroup.position.set(0, -2.6, -1.5); 
            martiniGroup.scale.set(1.4, 1.4, 1.4);
            scene.add(martiniGroup);

            // --- 3. CONDENSATION DROPLETS ---
            const dropCount = 7000; 
            const dropGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const dropMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, metalness: 0, roughness: 0.1, transmission: 0.99, thickness: 0.8, ior: 1.8,
                clearcoat: 1.0, clearcoatRoughness: 0.05, transparent: true, envMapIntensity: 1.5
            });
            const drops = new THREE.InstancedMesh(dropGeometry, dropMaterial, dropCount);
            scene.add(drops);

            const dummy = new THREE.Object3D();
            const dropData = []; 
            for (let i = 0; i < dropCount; i++) {
                let x, y;
                const roll = Math.random();
                if (roll < 0.75) { 
                    const angle = Math.random() * Math.PI * 2;
                    const r = 4.5 + Math.random() * 8; 
                    x = Math.cos(angle) * r; y = Math.sin(angle) * r * 0.7; 
                } else {
                    x = (Math.random() - 0.5) * 8; y = (Math.random() - 0.5) * 6;
                }
                const z = 0; 
                let s = Math.pow(Math.random(), 3) * 1.5 + 0.15; 
                let stretchY = 1.0 + (Math.random() * Math.random() * 0.8); 
                if (Math.random() < 0.02) { stretchY = 3.0 + Math.random() * 2.0; s *= 0.8; }
                dummy.position.set(x, y, z);
                dummy.scale.set(s, s * stretchY, s * 0.4); 
                dummy.rotation.z = (Math.random() - 0.5) * 0.2; 
                dummy.updateMatrix();
                drops.setMatrixAt(i, dummy.matrix);
                dropData.push({
                    x: x, y: y, z: z, scaleX: s, scaleY: s * stretchY, scaleZ: s * 0.4,
                    vx: 0, vy: 0, gravitySpeed: (s > 0.5 && stretchY < 2.0 ? Math.random() * 0.002 + 0.0005 : 0)
                });
            }
            drops.instanceMatrix.needsUpdate = true;

            const mouse = new THREE.Vector2(-9999, -9999); 
            const targetMouse = new THREE.Vector2();
            let scrollY = 0;
            document.addEventListener('mousemove', (e) => {
                targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                const title = document.getElementById('hero-title');
                if(title) title.style.transform = `translate(${targetMouse.x * 5}px, ${targetMouse.y * 5}px)`;
            });
            window.addEventListener('scroll', () => { scrollY = window.scrollY; });

            function animate() {
                requestAnimationFrame(animate);
                mouse.x += (targetMouse.x - mouse.x) * 0.1;
                mouse.y += (targetMouse.y - mouse.y) * 0.1;
                bgMesh.rotation.y = mouse.x * 0.02;
                bgMesh.rotation.x = -mouse.y * 0.02;
                
                // Bubbles Animation
                const positions = bubbleSystem.geometry.attributes.position.array;
                for(let i=0; i<bubbleCount; i++) {
                    positions[i*3+1] += bubbleSpeeds[i];
                    if(positions[i*3+1] > 3.5) {
                        positions[i*3+1] = 2.8; 
                        const r = Math.random() * 0.9; 
                        const theta = Math.random() * Math.PI * 2;
                        positions[i*3] = r * Math.cos(theta);
                        positions[i*3+2] = r * Math.sin(theta);
                    }
                }
                bubbleSystem.geometry.attributes.position.needsUpdate = true;

                // Droplets Animation
                for (let i = 0; i < dropCount; i++) {
                    const data = dropData[i];
                    const mouseWorldX = mouse.x * 9; 
                    const mouseWorldY = mouse.y * 7;
                    const dx = data.x - mouseWorldX;
                    const dy = data.y - mouseWorldY;
                    const distSq = dx*dx + dy*dy;
                    if (distSq < 4.0) {
                        const dist = Math.sqrt(distSq);
                        const force = (2.0 - dist) * 0.02; 
                        data.vx += (dx / dist) * force;
                        data.vy += (dy / dist) * force;
                    }
                    data.x += data.vx; data.y += data.vy;
                    data.vx *= 0.92; data.vy *= 0.92;
                    let totalSpeed = (data.gravitySpeed + (scrollY * 0.0001)) * 0.05; 
                    data.y -= totalSpeed;
                    if (data.y < -9) {
                        data.y = 9; data.x = (Math.random() - 0.5) * 20; data.vx = 0; data.vy = 0;
                    }
                    dummy.position.set(data.x, data.y, data.z);
                    dummy.scale.set(data.scaleX, data.scaleY, data.scaleZ);
                    dummy.updateMatrix();
                    drops.setMatrixAt(i, dummy.matrix);
                }
                drops.instanceMatrix.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
