<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDUSTRY | Bar Demo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#050505',
                        'panel-black': '#0A0A0A',
                        'electric-blue': '#00e0ff',
                        'uv-teal': '#00f7d1',
                        'neon-rose': '#FF7EB3',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                    },
                    fontFamily: {
                        'display': ['Montserrat', 'sans-serif'],
                        'body': ['Space Grotesk', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 10px rgba(0, 224, 255, 0.3)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: white; font-family: 'Space Grotesk', sans-serif; }
        .glass-panel { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-link { position: relative; color: #d1d5db; transition: color 0.3s ease; cursor: pointer; }
        .nav-link:hover, .nav-link.active, .group:hover .nav-link { color: white; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0%; height: 2px; background: #00e0ff; transition: width 0.3s ease; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        /* Mobile Menu */
        .mobile-menu { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .mobile-menu.open { transform: translateX(0); }
        
        /* Loader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body class="h-screen w-screen bg-pure-black selection:bg-electric-blue selection:text-black overflow-x-hidden">

    <!-- Loading Screen -->
    <div id="loader" class="loader">
        <div class="text-white font-display text-2xl tracking-[0.5em] animate-pulse">INDUSTRY<span class="text-electric-blue">.IO</span></div>
    </div>

    <!-- HEADER -->
    <header class="fixed top-0 left-0 w-full h-24 z-50 glass-panel border-b border-glass-border flex justify-between items-center px-8">
        <div class="flex items-center z-20">
            <a href="../index.html" class="font-display font-black text-2xl tracking-tighter text-white drop-shadow-lg">INDUSTRY</a>
        </div>
        
        <nav class="hidden md:flex absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 items-center gap-8">
            <a href="../home.html" class="nav-link font-display text-xs font-bold tracking-wider">HOME</a>
            <a href="../about.html" class="nav-link font-display text-xs font-bold tracking-wider">ABOUT</a>
            
            <!-- Demo Dropdown -->
            <div class="relative group">
                <button class="nav-link active font-display text-xs font-bold tracking-wider flex items-center gap-1 outline-none">
                    DEMO <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-hover:rotate-180"></i>
                </button>
                <div class="absolute top-full left-1/2 transform -translate-x-1/2 mt-4 w-40 bg-black/90 border border-glass-border rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 translate-y-2 group-hover:translate-y-0 z-50 backdrop-blur-md">
                    <a href="demo/bar.html" class="block px-4 py-3 text-xs font-display font-bold tracking-wider text-white bg-white/10 border-b border-white/5 text-center">BAR DEMO</a>
                    <a href="demo/staff.html" class="block px-4 py-3 text-xs font-display font-bold tracking-wider hover:bg-white/10 text-gray-300 hover:text-white transition-colors text-center">STAFF DEMO</a>
                </div>
            </div>
            
            <a href="../download.html" class="nav-link font-display text-xs font-bold tracking-wider text-electric-blue drop-shadow-[0_0_5px_rgba(0,224,255,0.5)]">DOWNLOAD NOW</a>
        </nav>
        
        <div class="flex items-center gap-6 z-20">
            <button class="hidden md:flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 border border-electric-blue/30 rounded-lg transition-all text-xs font-bold tracking-wider text-electric-blue shadow-neon-blue group backdrop-blur-sm">
                <i data-lucide="user" class="w-4 h-4 group-hover:rotate-12 transition-transform"></i> LOG IN
            </button>
             <button class="md:hidden text-white" onclick="toggleMobileMenu()">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

     <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="mobile-menu fixed inset-0 z-40 bg-pure-black/95 backdrop-blur-xl flex flex-col items-center justify-center gap-8 md:hidden">
        <button class="absolute top-8 right-8 text-white" onclick="toggleMobileMenu()">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <a href="../home.html" class="font-display text-2xl font-bold text-white tracking-wider">HOME</a>
        <a href="../about.html" class="font-display text-2xl font-bold text-white tracking-wider">ABOUT</a>
        <a href="demo/bar.html" class="font-display text-2xl font-bold text-white tracking-wider">BAR DEMO</a>
        <a href="demo/staff.html" class="font-display text-2xl font-bold text-white tracking-wider">STAFF DEMO</a>
        <a href="../download.html" class="font-display text-2xl font-bold text-electric-blue tracking-wider">DOWNLOAD NOW</a>
        <a href="#" class="font-display text-xl font-bold text-gray-400 tracking-wider flex items-center gap-2"><i data-lucide="user" class="w-5 h-5"></i> LOG IN</a>
    </div>

    <!-- MAIN CONTENT PLACEHOLDER -->
    <main class="pt-32 px-8 w-full min-h-screen flex flex-col items-center justify-start relative z-0">
        <!-- Ambient Glows -->
        <div class="absolute top-1/4 right-1/4 w-[500px] h-[500px] bg-electric-blue/5 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-1/4 left-1/4 w-[500px] h-[500px] bg-neon-rose/5 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="w-full max-w-7xl h-[800px] border-2 border-dashed border-white/10 rounded-2xl flex items-center justify-center relative z-10">
            <div class="text-center">
                <h2 class="font-display font-bold text-2xl text-gray-500 mb-2">BAR DASHBOARD</h2>
                <p class="font-body text-sm text-gray-600">Paste your dashboard code here.</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // Remove Loader
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => loader.style.opacity = '0', 500);
            setTimeout(() => loader.remove(), 1500);
        });

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('open');
        }
    </script>
</body>
</html>
