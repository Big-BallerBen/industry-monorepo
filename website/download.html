<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDUSTRY | Download</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#050505',
                        'panel-black': '#0A0A0A',
                        'electric-blue': '#00e0ff',
                        'uv-teal': '#00f7d1',
                        'neon-rose': '#FF7EB3',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                    },
                    fontFamily: {
                        'display': ['Montserrat', 'sans-serif'],
                        'body': ['Space Grotesk', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-blue': '0 0 10px rgba(0, 224, 255, 0.3)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 1s ease-out forwards',
                        'pulse-glow': 'pulseGlow 3s infinite',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.6, transform: 'scale(1)' },
                            '50%': { opacity: 1, transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .nav-link {
            position: relative;
            color: #9ca3af; 
            transition: color 0.3s ease;
            cursor: pointer;
        }
        
        .nav-link:hover, .nav-link.active, .group:hover .nav-link {
            color: white;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* Nav Link Underline */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #00e0ff;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after {
            width: 100%;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-pure-black selection:bg-electric-blue selection:text-black flex flex-col">

    <!-- HEADER -->
    <header class="fixed top-0 left-0 w-full h-24 z-50 transition-all duration-300 glass-panel border-b border-glass-border flex justify-between items-center px-8">
        <!-- Left: Logo -->
        <div class="flex items-center z-20">
            <h1 class="font-display font-black text-2xl tracking-tighter text-white drop-shadow-lg">
                INDUSTRY
            </h1>
        </div>

        <!-- Center: Horizontal Menu -->
        <nav class="hidden md:flex absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 items-center gap-8">
            <a href="INDUSTRY_Platform.html" class="nav-link font-display text-xs font-bold tracking-wider">
                HOME
            </a>
            <a href="INDUSTRY_About.html" class="nav-link font-display text-xs font-bold tracking-wider">
                ABOUT
            </a>
            <!-- DEMO Dropdown -->
            <div class="relative group">
                <button class="nav-link font-display text-xs font-bold tracking-wider flex items-center gap-1 outline-none">
                    DEMO
                    <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-hover:rotate-180"></i>
                </button>
                <div class="absolute top-full left-1/2 transform -translate-x-1/2 mt-4 w-40 bg-black/90 border border-glass-border rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 translate-y-2 group-hover:translate-y-0 z-50 backdrop-blur-md">
                    <a href="#" class="block px-4 py-3 text-xs font-display font-bold tracking-wider hover:bg-white/10 text-gray-300 hover:text-white transition-colors border-b border-white/5 text-center">
                        BAR DEMO
                    </a>
                    <a href="#" class="block px-4 py-3 text-xs font-display font-bold tracking-wider hover:bg-white/10 text-gray-300 hover:text-white transition-colors text-center">
                        STAFF DEMO
                    </a>
                </div>
            </div>
            <!-- Active Download Link -->
            <a href="#" class="nav-link active font-display text-xs font-bold tracking-wider text-electric-blue drop-shadow-[0_0_5px_rgba(0,224,255,0.5)]">
                DOWNLOAD NOW
            </a>
        </nav>

        <!-- Right: LOG IN Button -->
        <div class="flex items-center gap-6 z-20">
            <button class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 border border-electric-blue/30 rounded-lg transition-all text-xs font-bold tracking-wider text-electric-blue shadow-neon-blue group backdrop-blur-sm">
                <i data-lucide="user" class="w-4 h-4 group-hover:rotate-12 transition-transform"></i>
                LOG IN
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col items-center justify-center relative z-0 px-6">
        
        <!-- Background Glows -->
        <div class="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-electric-blue/10 rounded-full blur-[150px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-0 w-[500px] h-[500px] bg-neon-rose/5 rounded-full blur-[150px] pointer-events-none"></div>

        <!-- Hero Content -->
        <div class="relative z-10 text-center max-w-4xl mx-auto animate-fade-up">
            
            <h1 class="font-display font-black text-5xl md:text-7xl lg:text-8xl tracking-tight text-white mb-8 leading-none drop-shadow-2xl">
                SKIP THE <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-electric-blue to-uv-teal">APP STORE.</span>
            </h1>

            <p class="font-body text-gray-400 text-lg md:text-xl tracking-wide max-w-xl mx-auto mb-12 leading-relaxed">
                INDUSTRY is a Progressive Web App. Install it directly from your browser for instant, full-screen access on iOS and Android. Faster than a download, smoother than a site.
            </p>

            <!-- PWA Install Action -->
            <div class="flex flex-col items-center gap-6">
                
                <button class="group relative px-10 py-5 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-2xl transition-all duration-300 shadow-[0_0_30px_rgba(34,211,238,0.4)] hover:shadow-[0_0_50px_rgba(34,211,238,0.6)] hover:scale-[1.02] active:scale-[0.98] flex items-center gap-4">
                    <i data-lucide="plus-square" class="w-6 h-6"></i>
                    <span class="font-display text-sm md:text-base tracking-[0.2em] uppercase">Add to Home Screen</span>
                </button>

                <!-- Helper Text -->
                <div class="flex items-center gap-2 text-xs text-gray-500 font-body bg-white/5 px-4 py-2 rounded-full border border-white/5">
                    <i data-lucide="info" class="w-3 h-3 text-electric-blue"></i>
                    <span>iOS: Tap 'Share' <i data-lucide="share" class="w-3 h-3 inline mx-1"></i> then 'Add to Home Screen'</span>
                </div>

            </div>

        </div>

    </main>

    <script>
        lucide.createIcons();

        function toggleAIModal() {
            // Placeholder for consistent header behavior if needed
            alert("AI Ops is available on the Dashboard.");
        }
    </script>
</body>
</html>
